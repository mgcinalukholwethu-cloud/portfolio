  // Navigation + dynamic rendering
  let currentPage = "home";

  function renderPage(pageId) {
    const content = pageContents[pageId];
    if (!content) return;
    const appRoot = document.getElementById("app-root");
    if (appRoot) {
      appRoot.innerHTML = content;
    }
    // Update active nav style
    document.querySelectorAll(".nav-link").forEach(link => {
      const linkPage = link.getAttribute("data-page");
      if (linkPage === pageId) {
        link.classList.add("active");
        link.style.color = "#F5B042";
      } else {
        link.classList.remove("active");
        link.style.color = "#ddd";
      }
    });
    // Re-attach hire button if exists on home
    if (pageId === "home") {
      const hireBtn = document.getElementById("hire-me-btn");
      if (hireBtn) {
        hireBtn.addEventListener("click", (e) => {
          e.preventDefault();
          renderPage("contact");
          // scroll to contact smoothly
          setTimeout(() => {
            document.getElementById("contact")?.scrollIntoView({ behavior: "smooth" });
          }, 100);
        });
      }
    }
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  // Attach navigation listeners
  function initNavigation() {
    const navLinks = document.querySelectorAll(".nav-link");
    navLinks.forEach(link => {
      link.addEventListener("click", (e) => {
        e.preventDefault();
        const page = link.getAttribute("data-page");
        if (page) {
          currentPage = page;
          renderPage(currentPage);
        }
      });
    });
    // default render home
    renderPage("home");
  }

  // Add extra listener for "About" and "Contact" if hashchange or initial
  window.addEventListener("DOMContentLoaded", () => {
    initNavigation();
    // also handle any direct hash? optional
  });
